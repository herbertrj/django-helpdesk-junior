{% extends "base.html" %}

{% block title %}Criar conta | Help Desk{% endblock %}

{% block content %}
<h2>Criar conta</h2>
<form method="post" class="form-card">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Cadastrar</button>
</form>
<p>
    Ja tem conta?
    <a href="{% url 'login' %}">Entrar</a>
</p>
{% endblock %}
